      </div>`}).join(``),this.el.classList.add(`active`),requestAnimationFrame(()=>{this.listEl.scrollTop=this.listEl.scrollHeight})}hide(){this.el.classList.remove(`active`)}isVisible(){return this.el.classList.contains(`active`)}},Fe=[{id:`prologue_start`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)`,dialogues:[{text:`清晨六点四十分。`},{text:`手机闹钟还没响，但我已经醒了。窗帘缝隙里漏进来的光，在天花板上切开一道细长的口子。`},{text:`我翻身下床，光脚踩在木地板上，去卫生间洗漱。`},{text:`水龙头的水声很响，在这个老小区的清晨里显得格外突兀。我挤牙膏，刷牙，漱口。`},{text:`然后我抬起头，看向镜子。`},{text:`镜子里的人也在看我。`},{text:`但那不是我的脸。`,effect:{type:`flash`}},{text:`——不是"完全不是"的那种不是。更像是一种说不清的不对：像你盯着一个0.95倍慢放的视频，所有细节都在，但总和你的记忆差了一点。`},{text:`我盯着镜子里那张脸看了大概十秒。`},{text:`镜子里的人也在看我，做着和我一模一样的动作，有着和我一模一样的表情。但就是……不对。`},{text:`我揉了揉眼睛。昨晚画到凌晨三点，大概是太累了。`},{text:`回到卧室，拿起手机，习惯性地翻了翻相册。`},{text:`上周六和几个朋友聚餐的合照。我放大自己的脸。`},{text:`那个笑容……是我的吗？`},{text:`我把手机放下，又拿起来。反反复复看了那张合照好几遍。照片里的自己在笑，眼睛弯成两道弧线——我记得那个笑，那天周其深讲了一个特别烂的谐音梗。但照片里那张脸，那个笑的角度，好像和记忆里的不太一样。`},{text:`算了。今天还要去出版社签合同。不能迟到。`},{text:`我换好衣服，推开老小区的单元门。楼下的早餐铺子已经开张了，蒸笼的热气在晨光里往上飘。`},{character:`沈姐`,text:`小林！早啊，今天吃啥？老样子？`,position:`right`,spriteAction:`show`},{text:`沈姐是楼下早餐铺的老板娘，四十多岁，嗓门大，记性好，谁家孩子考几分她都记得。我在她这买了六年早餐。`},{character:`林萧`,text:`老样子，豆浆油条。`},{character:`沈姐`,text:`好嘞。哎小林，你这几天……`},{text:`她忽然停下来，手上的夹子悬在半空，歪着头看我，像在辨认什么。`},{character:`沈姐`,text:`……你这几天是不是换了个发型啊？看着不太像你。`},{text:`豆浆杯被放在台面上，热气扑到我的手腕上。`},{text:`《镜中人》`,effect:{type:`delay`,ms:2e3}}],choices:[{text:`「不太像我？什么意思？」追问沈姐`,nextScene:`prologue_ask_shen`,setFlag:{trust_self:!0}},{text:`敷衍过去，心里开始不安`,nextScene:`prologue_uneasy`,setFlag:{doubt_start:!0}}]},{id:`prologue_ask_shen`,background:`gradient:linear-gradient(180deg, #f5e6d3 0%, #e8d5b7 100%)`,sprites:[{character:`沈姐`,position:`right`,expression:`default`}],dialogues:[{character:`林萧`,text:`沈姐，你刚才说不太像我，是什么意思？`},{character:`沈姐`,text:`啊？我就是随口一说……可能是你今天气色不太一样？或者瘦了？`},{character:`沈姐`,text:`哎，你看我这嘴。就是感觉哪里变了点儿，说不上来。你别在意啊。`},{text:`她的表情倒不像随口一说。她又看了我一眼，那眼神像是在确认是不是认错了人。`},{text:`我付了钱，拎着豆浆油条走了。塑料袋在手指上勒出一道红印。`},{text:`沈姐认识我六年。她应该是这个街区最能确认「我是我」的人。`},{text:`如果连她都开始犹豫……`},{text:`我把油条咬了一口，嚼了半天没尝出味道。`},{text:`手机震了一下。一条短信。陌生号码。`},{text:`「不要相信镜子。也不要相信你身边的人。」`}],choices:[{text:`回复这条短信`,nextScene:`prologue_reply_msg`},{text:`当作垃圾短信，删掉`,nextScene:`prologue_ignore_msg`,setFlag:{trust_self:!0}}]},{id:`prologue_uneasy`,background:`gradient:linear-gradient(180deg, #f5e6d3 0%, #e8d5b7 100%)`,sprites:[{character:`沈姐`,position:`right`,expression:`default`}],dialogues:[{character:`林萧`,text:`哈哈，可能是我今天穿了件新外套。`},{character:`沈姐`,text:`可能是吧……给，你的油条。`},{text:`我接过塑料袋。她的目光在我脸上又停了一秒，然后移开了。`},{text:`我边走边吃，油条炸得有点老，嚼起来发硬。`},{text:`沈姐刚才看我的眼神，不是认错人的眼神。是那种——你确信是某人，但每一个信号都在告诉你这不是那个人的——眼神。`},{text:`我拿出手机。打开前置摄像头。`},{text:`屏幕里是一张我每天都见的脸。但今天，有一点细微的、无法命名的偏差。`},{text:`手机震了一下。一条短信。陌生号码。`},{text:`「不要相信镜子。也不要相信你身边的人。」`}],choices:[{text:`回复这条短信`,nextScene:`prologue_reply_msg`},{text:`当作垃圾短信，删掉`,nextScene:`prologue_ignore_msg`,setFlag:{trust_self:!0}}]},{id:`prologue_reply_msg`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)`,dialogues:[{character:`林萧`,text:`……你是谁？`},{text:`我打了三个字，盯着屏幕。已读。没有回复。`},{text:`我继续打字：「你怎么知道我的号码？」`},{text:`又已读。还是没有回复。`},{text:`我把手机放回口袋，决定先去出版社。`},{text:`路上我一直在想：那条短信里说"不要相信镜子"——和我早上在镜子前的感觉是巧合吗？`},{text:`地铁车厢里很挤。我站在靠门的位置，对面的玻璃上映出我的影子。`},{text:`我看着那个倒影。看着我。`},{text:`忽然不知道玻璃那头的人，到底是谁。`}],nextScene:`ch1_start`},{id:`prologue_ignore_msg`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)`,dialogues:[{text:`我把短信标记为垃圾，删掉。`},{text:`这种骚扰短信每天都有。群发的。"不要相信镜子"——下一句怕不是让你转账汇款。`},{text:`但走到地铁站的路上，我下意识避开了所有能反光的玻璃。`},{text:`商店橱窗、公交站牌、路边停的车窗。`},{text:`我装作在看手机，一路没抬头。`}],nextScene:`ch1_start`},{id:`ch1_start`,background:`gradient:linear-gradient(180deg, #e8e8e8 0%, #d0d0d0 100%)`,onEnter:{setFlags:{ch1_started:!0}},sprites:[{character:`保安`,position:`left`,expression:`default`}],dialogues:[{text:`出版社在城东，一座橙色的旧厂房改造的创意园。我六年前第一次来这里，骑着刚买的二手电动车，后座上绑着一卷手稿。`},{text:`这条路线我走了几百次。但今天，大门口的保安拦下了我。`},{character:`保安`,text:`你找谁？`},{character:`林萧`,text:`……我是林萧，畅阅文化的插画师。我在这工作了好几年了。`},{text:`保安的表情像是在回忆什么。他看了我一眼。又看了一眼。`},{character:`保安`,text:`哦……行，进去吧。`},{text:`他不是在回忆门禁名单。他是在回忆我的脸。`},{text:`进了电梯，我按了七楼。电梯里的镜面不锈钢反射出一张脸——我的脸。但保安刚才的反应，让我开始不确定了。`},{text:`我在电梯里用前置摄像头给自己拍了张照，翻出两星期前在办公室拍的另一张自拍。`,effect:{type:`photo_compare`,before:`两周前：自拍于办公室，自然光，微笑。脸部轮廓熟悉。`,after:`今天：电梯内自拍，冷白灯光，面无表情。脸部轮廓……略有偏移？`}},{text:`我把两张照片放大，交替着看。颧骨的弧度，似乎不一样。`},{text:`下颚线的角度，似乎也不一样。`},{text:`我不确定。我不确定是不是光线的问题，角度的偏差，还是我自己的错觉。`},{text:`这时电梯门开了。`}],choices:[{text:`直接去周其深办公室，当作什么都没发生`,nextScene:`ch1_meet_zhou`},{text:`先去洗手间用镜子仔细看看自己`,nextScene:`ch1_check_mirror`,setFlag:{trust_self:!0}}]},{id:`ch1_check_mirror`,background:`gradient:linear-gradient(180deg, #f0f0f0 0%, #dcdcdc 100%)`,sprites:[{character:`周其深`,position:`left`,expression:`default`}],dialogues:[{text:`洗手间的荧光灯管发出微弱的嗡鸣声。我站在洗手台前，看着镜子。`},{text:`没有电梯里的那种不锈钢的变形。没有手机摄像头的光线干扰。就是一面最普通的镜子。`},{text:`我看着镜子里的人。`},{text:`额头。我的。眉毛。我的。眼睛。`},{text:`眼睛不太对。`},{text:`我低下头再看。可能是角度。可能是光线。可能是从早上到现在一直在自己吓自己。`},{text:`但镜子里那个人的眼眶，无论怎么看，都比我记得的更往外偏了那么一点。一点。就那么一点。`},{text:`我把手机拿出来。打开相册。翻到去年秋天的一张照片——我站在银杏树下，手插在口袋里，对着镜头笑得很好。`},{text:`那张脸和镜子里的脸。`},{text:`我吞咽了一下。喉咙里什么都没有，但吞咽的感觉很真实——像咽下一块不能消化的什么东西。`},{text:`有人推门进来。是周其深。`},{character:`周其深`,text:`哟，林萧！你怎么在这？我正找你呢！`},{text:`他的笑和平时一样，很大声，整个洗手间都是他的回音。`},{character:`周其深`,text:`我跟你说，今天是个大日子。合同打印出来了，就等你签字。六年的作品，今天定下来了。`},{text:`他看着我的脸。没有迟疑。没有"不太像你"。`},{text:`但苏鹤的短信回响在我脑子里——"不要相信你身边的人。"`}],choices:[{text:`跟他去办公室签合同`,nextScene:`ch1_sign_contract`},{text:`"周哥，你看着我。我有没有哪里和以前不一样？"`,nextScene:`ch1_ask_zhou`}]},{id:`ch1_meet_zhou`,background:`gradient:linear-gradient(180deg, #fafafa 0%, #e0e0e0 100%)`,sprites:[{character:`周其深`,position:`left`,expression:`default`}],dialogues:[{text:`周其深在自己的办公室里，门开着，手机夹在耳朵和肩膀之间，手上还在翻文件。看到我，对着话筒说"行行先这样"，挂了。`},{character:`周其深`,text:`林萧！来得正好。我跟你说，这次是真的定下来了。合同在这，你看看。`},{text:`他把一叠纸推到我面前。封面上印着出版社的logo——一个蓝色的打开的书，右下角写着我作品的名字。`},{text:`六年的心血。`},{character:`周其深`,text:`你怎么了？脸色不太好啊，昨晚熬夜了？`},{text:`他的语气很自然。眼神也是。没有沈姐那种迟疑。`},{text:`他是出版社里最熟悉我的人。如果他也没看出任何问题——那也许本来就没什么问题。`}],choices:[{text:`"没事，昨晚画到三点。" 拿起合同看`,nextScene:`ch1_sign_contract`},{text:`"周哥，你有没有觉得我最近和以前不太一样？"`,nextScene:`ch1_ask_zhou`}]},{id:`ch1_sign_contract`,background:`gradient:linear-gradient(180deg, #fafafa 0%, #e0e0e0 100%)`,sprites:[{character:`周其深`,position:`left`,expression:`default`}],dialogues:[{text:`我拿起笔。`},{text:`合同上印着我的名字：林萧。身份证号、联系方式、作品版权信息。一切准确无误。`},{text:`我签了字。笔迹是我自己的。`},{character:`周其深`,text:`好！林萧，六年的东西今天终于定下来了。晚上我请客，叫上几个编辑，去庆——`},{text:`他的手机响了。他看了一眼，皱了下眉，接起来。`},{character:`周其深`,text:`喂？……嗯……嗯？什么？`},{text:`他的语气变得很奇怪。他看向窗户，不看我。`},{character:`周其深`,text:`好，我知道。一会说。`},{text:`挂了电话，他转过头来，笑容重新堆回脸上，但眼角的肌肉没跟上。`},{character:`周其深`,text:`没什么，社里另一个项目的事。你先回去好好休息。`},{text:`他刚才打电话的时候，手在桌上敲。敲得很轻，很快，像在发摩斯密码。`},{text:`我出了出版社大门。外面阳光很好，照在身上很暖。`},{text:`但我浑身发冷。`},{text:`因为签合同的时候，我看到角落的合约副本上，抄送的邮箱地址——不是我的。`},{text:`那个邮箱：lxiao2040@protonmail.com`},{text:`我不记得我注册过这个邮箱。`},{text:``,effect:{type:`document_view`,title:`合同副本 · 通讯信息`,content:`

          `}},{text:`我盯着这行英文看了很久。`},{text:`门只能从里面打开。`},{text:`手机震了一下。陌生号码。不是早上发短信那个——但用了同一个虚拟号段。`},{text:`「你在查白窗。停下来。你不了解你在跟什么打交道。」`}],choices:[{text:`"那你告诉我，我应该了解什么？"`,nextScene:`ch2_email_deep`,setFlag:{push_suhe:!0}},{text:`"你是谁？凭什么命令我？"`,nextScene:`ch2_email_deep`,setFlag:{challenge_suhe:!0}}]},{id:`ch2_email_deep`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`对方沉默了两分钟。然后连续发来了三条消息。`},{text:`「我叫苏鹤。我以前是他们的人。」`,effect:{type:`chat_message`,sender:`苏鹤`,message:`我叫苏鹤。我以前是他们的人。`,time:`21:34`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`白窗是一个身份交易组织。他们不杀人——他们替换人。从社会意义上抹掉一个人，然后把干干净净的身份卖给需要"消失"的客户。`,time:`21:35`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`你是他们这季度的商品。你的替换已经开始了三周。再过不到七天，林萧这个身份就彻底不属于你了。`,time:`21:35`}},{text:`我盯着屏幕。手指没有知觉。`},{text:`我打了一行字，删掉。又打了一行，再删掉。`},{text:`最后只回了三个字。`},{character:`林萧`,text:`……凭什么相信你。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`你的合同副本上那个 ProtonMail 邮箱不是我注册的。是白窗的"镜像组"注册的——他们专门负责在数字层面复制目标。那个邮箱已经绑定了你所有主流平台的账号备用恢复地址。`,time:`21:37`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`去你用的那几个平台——微博、邮箱、银行APP——查看安全设置里的备用恢复方式。如果多了你不认识的东西，你就知道我说的是真的。`,time:`21:38`}},{text:`我打开手机银行APP。安全设置。备用验证邮箱。`},{text:`lxiao2040@protonmail.com。`},{text:`我用的是招行。我没设过这个。我确定。`},{text:`然后我打开微博。账号安全。密保邮箱。`},{text:`lxiao2040@protonmail.com。`},{text:`微博的修改时间是——三周前。`},{text:`我的手指开始发抖。不是害怕，是一种类似于冷冻之后正在解冻的刺痛感。`},{text:`三周前。我在做什么？我在赶插画稿的最后几页。我在和周其深讨论合同细节。我在楼下沈姐的铺子里吃豆浆油条。`},{text:`三周前，有人用我不知道的方式，在一项一项地把我替换掉。`}],choices:[{text:`继续问苏鹤："白窗具体是怎么操作的？多少人参与？"`,nextScene:`ch2_suhe_explain`,setFlag:{ask_how:!0}},{text:`"我怎么阻止这个过程？"`,nextScene:`ch2_suhe_explain`,setFlag:{ask_stop:!0}}]},{id:`ch2_reply_stranger`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`我翻开那条陌生短信。上午发来的，四个字加一个句号。`},{text:`「不要相信镜子。也不要相信你身边的人。」`},{text:`我打了又删，删了又打。最后发了一个最简单的问题。`},{character:`林萧`,text:`你是谁。`},{text:`没有回音。等了十五分钟。还是没有。`},{text:`我开始怀疑这是不是真的垃圾短信。我是不是在跟一个群发诈骗短信较劲。`},{text:`正要放下手机的时候——`},{text:`——屏幕上的文字开始动了。`},{text:`那条我发出的"你是谁"下面，出现了三个字。不是新短信。而是在对话框里，对方把一个链接发了过来——端到端加密的匿名聊天室。`},{text:`链接后面附了一行字：`},{text:`「我不能在短信里说太多。会被监控。点这个链接。我的名字叫苏鹤。」`}],choices:[{text:`点开链接`,nextScene:`ch2_suhe_chat`,setFlag:{trust_suhe:!0}},{text:`不点——先查一下这个链接是否安全`,nextScene:`ch2_check_link`,setFlag:{cautious:!0}}]},{id:`ch2_check_link`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`我把链接放进几个在线安全扫描工具里跑了一遍。没有检测到钓鱼特征。域名的注册信息被隐私保护了，但底层是指向一个匿名通讯服务——不常见但也不违法。`},{text:`我深吸了一口气。`},{text:`点了进去。`}],nextScene:`ch2_suhe_chat`},{id:`ch2_suhe_chat`,background:`gradient:linear-gradient(180deg, #0f1923 0%, #1a2a36 100%)`,onEnter:{setFlags:{met_suhe_online:!0}},dialogues:[{text:`页面很简陋——黑色背景，灰色字体，像一个只用HTML写的留言板。但地址栏里显示了一个30个字符的随机ID。没有广告。没有追踪器。没有注册入口。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`你进来了。很好。`,time:`21:42`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我知道你现在有很多问题。我先告诉你最重要的事：你不是第一个，也不是最后一个。有一个组织专门做这件事——让一个人从社会上消失，然后把ta的人生卖给想换身份的人。他们叫自己「白窗」。`,time:`21:43`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我看过你的资料。你被选中是因为你符合他们的"理想目标画像"：独居、自由职业、社交圈子小、没有公职或企业身份绑定。像你这样的人，从社会意义上抹掉，需要的时间最短，引起的注意最少。`,time:`21:43`}},{text:`我的手悬在键盘上。不知道该不该打字。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`你可以不说话。但你需要知道一件事——你的买家已经在用你的身份了。他可能昨天刚用你的名字订了一张机票。或者前天用你的信用分申请了一笔消费贷。你越晚行动，能抢回来的就越少。`,time:`21:44`}},{text:`我终于开始打字。`},{character:`林萧`,text:`你说你是"他们的人"……为什么现在又来找我？`},{text:`一阵很长的停顿。聊天室里显示"对方正在输入……"，持续了将近一分钟。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`上一个目标……我没能帮上。`,time:`21:46`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我不认识那个人。但我全程看到了整个过程。从第一封假邮件，到最后一个人叫他"先生"而不是ta本来的名字。从旁观的屏幕后面看一个人消失，和亲手去做一样。`,time:`21:47`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我不想再看一次。`,time:`21:47`}},{text:`我盯着这几行字。`},{text:`我不知道屏幕那边是什么人。什么声音。什么手指在敲键盘。但这句话，我觉得是真的。`}],choices:[{text:`"帮我。告诉我该怎么做。"`,nextScene:`ch2_suhe_explain`,setFlag:{trust_suhe:!0,ask_help:!0}},{text:`"我需要证据。光说没有用。"`,nextScene:`ch2_suhe_explain`,setFlag:{ask_proof:!0}}]},{id:`ch2_call_zhou`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`我拨了周其深的号码。响了六声。他接了。`},{character:`周其深`,text:`喂？林萧，什么事，都这么晚了。`},{text:`他的声调和白天不一样。压低了。像是在不方便说话的地方。`},{character:`林萧`,text:`周哥，我签合同的时候看到副本上的抄送邮箱——lxiao2040@protonmail.com。那个不是我的邮箱。`},{text:`电话那头沉默了。`},{character:`周其深`,text:`……可能是社里行政部门填错了。我明天帮你改一下。`},{character:`林萧`,text:`行政部门的邮箱为什么要填 ProtonMail？而且我查了我的银行App——那个邮箱已经被设成了我账号的备用密保。不止一个平台。`},{text:`更长的沉默。`},{character:`周其深`,text:`林萧，你听我说。`},{text:`他的声音更低了。低到我能听见电话那头有另一个声音——很轻，像是什么人在房间里走动。`},{character:`周其深`,text:`有些事……你最好别查。别管那个邮箱。别管那些不对劲的事。该干什么干什么。你现在最重要的是——你的书，你的作品。把精力放在那个上面。其他的别碰。`},{character:`林萧`,text:`你知道些什么。你在帮我隐瞒。`},{character:`周其深`,text:`我没有——`},{character:`林萧`,text:`你上午接那个电话的时候——来电显示是 QW。QW 是什么意思，周哥？是白窗吗？`},{text:`这句话之后，电话那头安静了大概五秒。然后周其深用一种完全不同的语气说话——不像平时的周其深。像对着镜子练习过很多遍的一句台词。`},{character:`周其深`,text:`不要再打这个电话了。我也会换号。林萧——我很抱歉。`},{text:`他挂了。`},{text:`我握着手机坐在黑暗里。屏幕的蓝光照着我的脸。`},{text:`周其深说的是"我很抱歉"，不是"你在说什么"。`},{text:`他知道。他一直都知道。他只是没有阻止。`},{text:`手机又亮了。一条加密消息，来源是一个匿名聊天室链接。附言：`},{text:`「周其深不会帮你的。但我会。我叫苏鹤。如果你想搞清楚这件事——点进来。」`}],choices:[{text:`点进匿名聊天室`,nextScene:`ch2_suhe_chat`,setFlag:{trust_suhe:!0}},{text:`暂时不点——先平复一下情绪`,nextScene:`ch2_alone`,setFlag:{cautious:!0}}]},{id:`ch2_alone`,background:`gradient:linear-gradient(180deg, #0a0a14 0%, #050510 100%)`,dialogues:[{text:`我把手机翻扣在床上。屏幕的蓝光被被子盖住，房间陷入全黑。`},{text:`周其深——六年的编辑，唯一一个从头到尾相信我作品的人——刚才跟我说"不要再打这个电话了"。`},{text:`他知道。他一开始就知道。`},{text:`或许在我签合同的时候，或许在我认识他之前。或许这本出版合同从头到尾就是计划的一部分——用出版作为诱饵，让我专注于"即将成功"的幻象，不去注意别的东西正在被偷走。`},{text:`我在黑暗中躺了很长时间。`},{text:`然后伸手去摸手机。`},{text:`点进了那个链接。`}],nextScene:`ch2_suhe_chat`},{id:`ch2_suhe_explain`,background:`gradient:linear-gradient(180deg, #0f1923 0%, #1a2a36 100%)`,dialogues:[{text:`苏鹤开始系统性地向我解释这一切。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`白窗的运作方式是分层的。最外层是「侦察组」——找到符合目标画像的人，花两到四个月观察，收集所有社交信息、消费习惯、人际关系图谱。`,time:`21:52`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`然后是「镜像组」——在数字层面复制目标：注册相似的邮箱、在社交平台建立备用账号、收集生物信息（照片、声纹、甚至步态数据）。`,time:`21:53`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`最后是「替换组」——也是最危险的。他们会实际接触你的生活：收买或欺骗你身边的人、在公共记录里做小幅修改、逐步将"你"和"你的身份"分开。当足够的机构和足够多的人接受了那个新版本的"你"——你就成了假的那一个。`,time:`21:54`}},{text:`我想起了沈姐。想起了保安。想起了周其深那个不自然的笑。`},{character:`林萧`,text:`所以所有人都在配合他们？`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`不是所有人。大部分人不知道自己被利用了。你以为沈姐只是口无遮拦——但她可能是被刻意安排来"发现你的变化"的。你越是找人确认，那些人越是会说你变了。而你每解释一次，每找一个朋友求助——你就向白窗提供了一份关于你社会关系的新数据。`,time:`21:56`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`他们的逻辑是：当你身边的人开始觉得"你不太对"，而数据库里的"你"仍在一如既往地生活——刷信用卡、发朋友圈、交物业费——那么真正的你就变成了一个不可信的叙事者。`,time:`21:57`}},{text:`我放下手机。看着天花板。`},{text:`这套逻辑精密、冷静、滴水不漏。它不是暴力。它比暴力更可怕——它不需要暴力。它让世界自己来决定你是谁。`}],choices:[{text:`"我要怎么反击？"`,nextScene:`ch2_counterplan`,setFlag:{fight_back:!0}},{text:`"你当初为什么加入白窗？"`,nextScene:`ch2_suhe_past`,setFlag:{ask_suhe_past:!0}}]},{id:`ch2_suhe_past`,background:`gradient:linear-gradient(180deg, #0f1923 0%, #1a2a36 100%)`,dialogues:[{text:`苏鹤沉默了一阵。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我大学学的是信息安全。毕设做的是"数字身份的脆弱性"——一个非常理想主义的课题，想证明大多数人对自己数字身份的控制权微乎其微。`,time:`22:01`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`毕设被导师毙了。说太极端。但被另一个人看到了——一个在暗网研究同样问题的账号。他给了我一笔钱，让我把研究"落地"。我当时觉得那是某种技术咨询。等我发现他们在做的是身份交易的时候，已经过了我可以说"不"的时间点。`,time:`22:02`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我没有在合理化我的过去。我只是告诉你——这个组织不是一群疯子，他们是技术人员、前金融从业者、国际法务——他们知道制度的漏洞在哪。你一个人对抗不了。`,time:`22:03`}},{text:`然后苏鹤发来了一份文件。`},{text:``,effect:{type:`document_view`,title:`白窗 · 结构简图（苏鹤手绘）`,content:`
            <p style="margin-bottom: 12px;"><strong>侦察组</strong> → 锁定目标，收集日常数据</p>
            <p style="margin-bottom: 12px;"><strong>镜像组</strong> → 建立数字替身，逐步替换账号控制权</p>
            <p style="margin-bottom: 12px;"><strong>替换组</strong> → 物理世界介入，收买/欺骗身边人</p>
            <p style="margin-bottom: 12px;"><strong>交易组</strong> → 在暗网拍卖身份，对接买家</p>
            <p style="color: #e74c3c; margin-top: 20px;">你的替换已进行到第三阶段。剩余时间：约六天。</p>
          `}}],nextScene:`ch2_counterplan`},{id:`ch2_counterplan`,background:`gradient:linear-gradient(180deg, #0f1923 0%, #1a2a36 100%)`,dialogues:[{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`你唯一的机会是：在完全被替换之前，让足够多的权威机构和目击者在同一时间、同一场合确认"林萧这个人确实存在"。白窗的逻辑基础是"没有人能证明身份是被替换的"——因为身份是分散在无数微小的社会认定中的。你要反其道而行之。`,time:`22:08`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`有一个机会。三天后是你新书的发布会。出版社媒体名单上有十几家媒体。你如果在那个场合——加上你所有的原始材料、旧照片、旧身份证——公开出现，那么同一天会有大量独立的、彼此不关联的人确认你的身份。`,time:`22:09`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`这不一定能阻止他们。但能制造足够多的"社会证据"，让白窗的交易暂停——买家不会要一个已经引起公众注意的身份。`,time:`22:10`}},{text:`我看着屏幕。`},{text:`发布会。三天后。`},{text:`也就是说，周其深白天跟我签合同时，可能已经知道那个邮箱是镜像组的。他催促我签字，是因为合同的"作者副本"需要那个邮箱——这是流程的一环。`},{text:`而那通他当着我的面接的"社里电话"——来电显示QW——大概不是出版社的人。`},{text:`QW。White Window。白窗。`},{text:`周其深是替换组的。他的工作是确保林萧本人不会发现任何异常，直到过程完成。`},{text:`他的"帮助"——六年的编辑、推荐出版、谈下大合同——这些可能全是白窗计划的一部分：用成功麻痹我，用"信任的人"监视我。`},{text:`手机屏幕暗了。我坐在黑暗里想了很久。`}],choices:[{text:`决定照苏鹤的计划来——在发布会上公开现身`,nextScene:`ch2_converge`,setFlag:{plan_public:!0,trust_suhe:!0}},{text:`"给我三天时间考虑。" 先不答应`,nextScene:`ch2_converge`,setFlag:{hesitate:!0}}]},{id:`ch2_converge`,background:`gradient:linear-gradient(180deg, #2c3e50 0%, #1a252f 100%)`,dialogues:[{text:`凌晨两点。我坐在电脑前面，把今天——从早上照镜子到现在——发生的一切都写进了一个加密文档里。`},{text:`不是为了给别人看。是为了万一我真的消失了，至少有某种东西记录过"我存在过"。`},{text:`我备份了所有能备份的东西：旧照片、日记、聊天记录、和苏鹤的加密对话。我把它们打包成了三个文件，分别上传到不同的云盘，用不同的密码加密。`},{text:`然后我对着屏幕发呆。`},{text:`苏鹤说，三天后是我的新书发布会。那是唯一的机会。`},{text:`苏鹤也说，我不了解白窗在物理世界的触手有多长。周其深能是替换组的人，沈姐能是被"安排"来影响我的人——那我周围还有多少人是属于这盘棋的？`},{text:`以及最关键的：苏鹤本人——这个从屏幕另一边伸出手的人——到底是真的想帮我，还是在把我往更深的陷阱里引？`},{text:`我不知道。`},{text:`但我正在失去"我不知道"这个选项的奢侈。因为每一次我不知道的时候，白窗就知道。每次我犹豫的时候，替换就往前推进一步。`},{text:`我打开手机，看到一条新短信。不是苏鹤。是一个被隐藏了号码的来源。只有一行字：`},{text:`「我们希望你能来参加你自己的新书发布会。我们也会去的。」`},{text:`第二章 · 证词 · 完`,effect:{type:`delay`,ms:2500}}],nextScene:`ch3_start`},{id:`ch3_start`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`我在凌晨四点半醒来。不是被闹钟叫醒的，是手机屏幕上跳出一连串推送，震得床头柜嗡嗡响。`},{text:`第一条：招商银行——您的储蓄卡于04:27挂失成功，新卡将在三个工作日内寄送至预留地址。`},{text:`我没有挂失过。`},{text:`第二条：微博安全中心——您的账号于04:28在「杭州」的设备上通过短信验证码登录。`},{text:`我不在杭州。我从来不在杭州。`},{text:`第三条：菜鸟——您有一个快递已到达「杭州市西湖区文三路×××号3栋402」的丰巢柜。`},{text:`那个地址我不认识。那个收件人写的名字是——林萧。`,effect:{type:`delay`,ms:1500}},{text:`我坐在床上。手机屏幕的蓝光照着我的脸。窗帘外面的天色还是黑的，没有鸟叫，没有车声，世界静得像在等待什么事情发生。`},{text:`三周前，有人把我的银行备用邮箱改成了那个 ProtonMail。三周三天后，有人挂失了我的银行卡，从杭州登录了我的微博，用我的名字签收快递。`},{text:`这些操作不是一个人能完成的。它们精确、同步、在深夜执行——当我最不可能盯着屏幕的时候。`},{text:`苏鹤说过，白窗分四组。侦察。镜像。替换。交易。`},{text:`我现在知道，替换组是凌晨上班的。`},{text:``,effect:{type:`document_view`,title:`手机推送记录 · 04:27 - 04:32`,content:`
            <p style="margin-bottom: 6px;"><strong>04:27</strong> — 招商银行：挂失成功</p>
            <p style="margin-bottom: 6px;"><strong>04:28</strong> — 微博：杭州设备登录</p>
            <p style="margin-bottom: 6px;"><strong>04:29</strong> — 微信：账号在另一台手机登录（已踢出）</p>
            <p style="margin-bottom: 6px;"><strong>04:30</strong> — 菜鸟：快递已到达丰巢柜</p>
            <p style="margin-bottom: 6px;"><strong>04:32</strong> — 支付宝：添加了新的常用收货地址（杭州）</p>
            <p style="color: #e74c3c; margin-top: 12px;">全部来自同一IP段：浙江省杭州市。</p>
          `}},{text:`我试图登录我的银行APP。密码错误。再试。还是错误。三次之后，账户被临时锁定。`},{text:`我试图登录我的微博。密码错误。用手机验证码重置——验证码没有发到我的手机上。那个绑定的备用手机号不是我的。`},{text:`我坐在床上，盯着手里这块发光的玻璃。它是通往我的钱、我的社交、我的身份的入口。而这个入口的每一把锁，都正在被换掉。`},{text:`然后我看到了一张照片。`},{text:`一个大学同学——毕业之后很少联系——在朋友圈晒了一张合照。`},{text:``,effect:{type:`social_post`,platform:`微信朋友圈 · 赵禹`,content:`好久不见！昨晚在杭州碰到了老朋友，聊了一整晚，还是熟悉的配方。时间是把杀猪刀啊哈哈哈哈。`,likes:14,comments:3}},{text:`照片里，一个酷似我的人——穿着我从没见过的灰色卫衣——对着镜头比了个V字，笑容灿烂。`},{text:`赵禹配的文字是："碰到了老朋友"。`},{text:`照片里的人戴着我从来不戴的银色项链。头发比我短。肩膀比我的宽一点——赵禹以为是发福了，说"时间是把杀猪刀"。`},{text:`但我看到的不是发福。我看到的是另一个人。`},{text:`那个人在杭州。在凌晨四点半挂失我的银行卡、登录我的微博之后，昨晚还跟"老朋友"吃了一顿饭。`},{text:`我试着给赵禹发消息。消息没有发出去——我的微信在凌晨四点半被踢出了登录。`},{text:`窗外的天开始泛灰。我穿上外套，走出了公寓。我不确定要去哪，但我确定不能留在原地。留在原地就是在等他们下一个凌晨的推送。`}],choices:[{text:`去银行柜台——面对面解决银行卡的问题，同时获取挂失记录作为证据`,nextScene:`ch3_bank`,setFlag:{go_bank:!0}},{text:`去派出所报警——虽然不知道怎么说，但需要一份官方记录`,nextScene:`ch3_police`,setFlag:{go_police:!0}}]},{id:`ch3_bank`,background:`gradient:linear-gradient(180deg, #f5f5f0 0%, #e0dcd0 100%)`,sprites:[{character:`保安`,position:`left`,expression:`default`}],dialogues:[{text:`招商银行的营业厅八点半开门。我在门外站了四十分钟，手插在口袋里，看着晨练的老人一个一个从人行道上走过。`},{text:`我是第一个进去的。取了号。柜台的玻璃后面是一个四十多岁的女职员。我把身份证推过去。`},{character:`林萧`,text:`我的银行卡凌晨被挂失了。不是我操作的。我想查一下是谁挂的，从哪挂的。`},{text:`她在键盘上敲了一阵。看了屏幕。又看了我。`},{character:`银行职员`,text:`林萧先生，系统显示您今天凌晨通过电话银行自助挂失的。使用的是您预留的手机号——尾号3827。验证了身份证号和交易密码。全部正确。`},{text:`我的手机号尾号不是3827。`},{character:`林萧`,text:`那个手机号不是我的。我的手机号是——`},{character:`银行职员`,text:`我理解。但系统不会出错。如果有人用您的身份证号、密码和预留手机号完成了验证，这个操作在法律上就是您本人授权的。`},{text:`法律上就是我。`},{text:`她不是不想帮我。她是帮不了——在她的系统里，凌晨四点半那个操作就是"我"做的。每一个数字都对。每一个验证都通过。`},{text:`我从银行出来。手上多了一张挂失记录的回执。至少这是一份证据：有人在凌晨四点半用"我的身份"挂了"我的"银行卡。`},{text:`问题在于——在法律上，那个人就是我。`}],nextScene:`ch3_evidence`},{id:`ch3_police`,background:`gradient:linear-gradient(180deg, #f0f0f5 0%, #d8d8e0 100%)`,dialogues:[{text:`派出所的接待大厅有一股消毒液的味道。墙上贴着"有困难找民警"的标语，蓝底白字，印在磨砂塑料板上。`},{text:`值班的是一个看起来刚毕业没多久的年轻民警。他让我坐下，拿了一个登记本。`},{character:`民警`,text:`报案是吧。什么事？`},{character:`林萧`,text:`有人冒充我。盗用了我的银行卡、微博、微信——不是盗刷。是直接用我的身份。他们把我替换了。`},{text:`民警看着我。又看了看登记本。笔悬在半空。`},{character:`民警`,text:`你说他们冒充你……但是用你的卡、你的号？那刷的是你自己的卡啊，你自己不能改密码吗？`},{character:`林萧`,text:`他们改了密码。改了绑定的手机号。我改不回来——因为"我"已经不是系统认为的那个"我"了。`},{text:`他把笔放下了。`},{character:`民警`,text:`我可以帮你登记。但你这情况不是盗窃，不是诈骗，不是典型的网络犯罪。你说有人在"替换你"——这个在法律上没有对应的罪名。假设你要立案，需要明确的被告人、明确的损失金额、和能证明确实不是你本人操作的证据。你现在有什么证据？能证明凌晨那些操作不是你做的？`},{text:`他说得很有道理。极其有道理。`},{text:`因为密码是对的。身份证号是对的。从系统的角度看，这些操作就是"我"做的。我要如何向系统证明，那个通过了所有验证的人——不是我？`},{text:`我想了想。`},{character:`林萧`,text:`可以查IP。查操作设备。查挂失的电话录音。只要能证明那些指令的物理位置不在我所在地——`},{character:`民警`,text:`查IP和设备需要走流程。需要立案。立案需要初步证据。这是一个循环。`},{text:`他看着我。不是不同情。但同情的上限是一份登记记录。`},{text:`我拿到了那份登记记录。这只是备案，不能出警，不能调证。但它是一份官方文书——上面记载了我在某个时间点，主动向执法机关报告过"有人正在替代我"。`},{text:`苏鹤说过，我需要制造社会证据。这就是社会证据。虽然现在它还不能帮我立案——但如果将来我的身份被彻底覆盖，这份记录至少能证明，我曾经抗争过。`}],nextScene:`ch3_evidence`},{id:`ch3_evidence`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`中午。我坐在一家便利店的靠窗位置。外面开始下雨，玻璃上的水痕把街景割成碎片。`},{text:`我在笔记本电脑上打开了一个反向图片搜索工具——把赵禹朋友圈那张合照里的人脸裁切下来，上传，搜索。`},{text:`搜索结果出来的速度很快。大多数是零匹配。但有一条记录命中了。`},{text:`一个三周前发布在本地论坛「寻人启事」版块的帖子。`},{text:``,effect:{type:`document_view`,title:`寻人启事 · 杭州市第七人民医院`,content:`
            <p style="margin-bottom: 12px;"><strong>姓名：</strong>邱成</p>
            <p style="margin-bottom: 12px;"><strong>性别：</strong>男</p>
            <p style="margin-bottom: 12px;"><strong>年龄：</strong>29岁</p>
            <p style="margin-bottom: 12px;"><strong>失踪时间：</strong>三周前</p>
            <p style="margin-bottom: 12px;"><strong>失踪地点：</strong>杭州市第七人民医院精神科</p>
            <p style="margin-bottom: 12px;">患者于当日下午外出放风期间未归。身着病号服，身高约177cm，体型偏瘦，短发。有严重偏执妄想症状，坚信自己是另一个人。如有线索请联系医院保卫科。</p>
            <p style="color: #e74c3c; margin-top: 12px;">附：患者近期正面照一张（图片已加载）</p>
          `}},{text:`我盯着那张患者照片看了很久。`},{text:`那是一个人的正面免冠照。背景是白色墙壁。穿着蓝色条纹病号服。眼神涣散，嘴角紧绷。`},{text:`脸型——和我现在"正在变成的"那张脸一样。`},{text:`颧骨的外偏弧度。下颚线的角度。眼眶的形状。那些我在镜子里发现的、让我不确定是不是自己错觉的微小偏差——在这张照片上全部对得上。`,effect:{type:`flash`}},{text:`这个人叫邱成。29岁。精神分裂伴偏执妄想。`},{text:`他三周前从医院消失了。三周前。就是我第一次在镜子里觉得不对的时候。就是我的社交媒体照片开始被替换的时候。就是周其深催促我签合同的时候。`},{text:`三周。每一条时间线都交汇在三周前。`},{text:`我靠在便利店的塑料椅背上。雨声很大，打在铁皮屋檐上像细密的鼓点。`},{text:`邱成。买家说要替换我——但邱成不像是"买家"。他看起来不像任何人的"买家"。他看起来更像是一个被人从医院弄出来、然后塞进了别人的人生里的工具。`},{text:`或者——邱成也只是另一个受害者。一个被白窗从系统里删除的人，然后被当作面具戴在了我的脸上。`}],choices:[{text:`联系杭州市第七人民医院，查邱成的详细病历和失踪经过`,nextScene:`ch3_hospital`,setFlag:{investigate_hospital:!0}},{text:`把这个发现告诉苏鹤，问TA知不知道邱成这个人`,nextScene:`ch3_ask_suhe`,setFlag:{ask_suhe_ch3:!0}}]},{id:`ch3_hospital`,background:`gradient:linear-gradient(180deg, #e8e8e0 0%, #d5d5ca 100%)`,dialogues:[{text:`我拨通了杭州市第七人民医院的电话。转了三道分机，最后接通了精神科住院部的护士站。`},{character:`护士`,text:`您好，市七院精神科。`},{character:`林萧`,text:`你好，我想问一下关于你们医院之前失踪的一个病人——叫邱成。三周前走失的。`},{text:`电话那头安静了几秒。然后那个声音变得更低，更慢。`},{character:`护士`,text:`您是邱成的家属？`},{character:`林萧`,text:`……对。表弟。家里一直在找。`},{text:`撒这个谎的时候，我的心率几乎没变。我开始习惯对所有人撒谎了。`},{character:`护士`,text:`邱成的住院费一直有人在替他交。从他的医保账户自动扣款——上个月还在扣。我们一直以为他自己回去过。但他本人确实没有再出现。`},{character:`护士`,text:`他入院的时候，送他来的人是个男的，自称是他哥哥。预缴了半年的住院费。我们后来联系那个"哥哥"——他留的那个号码打不通了。`},{text:`有人替他交住院费。一个"哥哥"。把他送进精神科。让他待在里面。直到需要他去扮演另一个人的脸的时候，再把他弄出来。`},{character:`林萧`,text:`邱成入院之前，是做什么的？他家里还有谁？`},{character:`护士`,text:`他的入院资料写的是——无业。无配偶。无子女。父母双亡。紧急联系人是那个哥哥，号码也是那个。`},{text:`无业。无配偶。无子女。父母双亡。`},{text:`和我的档案几乎一样。独居。自由职业。社交圈子小。`},{text:`白窗不是在找一个替换目标。他们有一整套模板。邱成和他们要找的人是同一类人。他们不是"找到"了他的脸——他们早就拥有了它。在精神科的双重门背后。`},{text:`而那个"哥哥"——就是送他去精神病院的人。可能也是把他弄出来的人。`}],nextScene:`ch3_end`},{id:`ch3_ask_suhe`,background:`gradient:linear-gradient(180deg, #0f1923 0%, #1a2a36 100%)`,dialogues:[{text:`我打开加密聊天室。苏鹤在线。`},{character:`林萧`,text:`邱成。你认识这个名字吗？`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`……你从哪知道的。`,time:`13:14`}},{character:`林萧`,text:`那张正在变成我脸的人。他叫邱成。从杭州市第七人民医院失踪的。白窗把他放在了我的身份上面。他是谁？受害者？还是工具？`},{text:`苏鹤停了很长一段时间。长到我以为TA下线了。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我说过上一个目标我没能帮上。那个人就是邱成。`,time:`13:18`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`他的替换三个月前就完成了。邱成这个名字在法律上已经不存在——他的身份被卖给了一个需要从刑案里消失的人。买家拿着邱成的身份出了国。邱成本人——那个真实的人——被留在了一个精神病院里，被诊断为偏执妄想。`,time:`13:19`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`但你猜怎么着。三个月后，邱成的脸被"维护"成了一个可复用的模板。白窗不浪费资源。一个已经消失的人的脸，可以加在下一个目标身上——模糊那个目标的自我认知，让周围人更快觉得"你变了"。`,time:`13:20`}},{text:`我盯着最后一行字。`},{text:`我的脸正在被替换的——不是某个买家的脸。是上一个受害者的脸。`},{text:`白窗用邱成的脸作为"噪声"，覆盖在我的身份上。周围人看到的不再是"林萧"，而是"有点像林萧但不太对"的一个人——这种模糊正是他们计划的核心。当足够多的人觉得你不对的时候，那个"对的"就成了另一个人。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`邱成现在应该就在杭州。白窗把他从医院弄出来以后，让他在杭州"扮演你"的日常生活——签收快递、发微博、和朋友吃饭。他可能自己都不知道自己在做什么——他的诊断是偏执妄想，坚信自己是另一个人。`,time:`13:22`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`白窗只需要告诉他："你是林萧。你一直是林萧。"然后他的妄想就会帮他们完成剩下的一切。`,time:`13:23`}},{text:`邱成不是买家。邱成是被白窗反复利用的一枚棋子——先被剥夺自己的身份，然后被用来剥夺别人的。`},{text:`而我甚至不知道该恨他，还是该同情他。`}],nextScene:`ch3_end`},{id:`ch3_end`,background:`gradient:linear-gradient(180deg, #2c3e50 0%, #1a252f 100%)`,dialogues:[{text:`傍晚。雨停了。街面反射着路灯的橘黄色光，像一条条平行的铁轨。`},{text:`我现在知道了三件事。`},{text:`第一：白窗至少用了三周替换我的数字身份，用了一个已经"不存在"的人的脸作为面具。`},{text:`第二：邱成——那个被剥夺了自我的人——现在正在杭州以"林萧"的身份生活。他不知道自己是假的。或者说，他坚信自己是真的。`},{text:`第三：我的新书发布会在两天后。苏鹤说过，那是我唯一的反击窗口。但白窗也知道了。他们在那场发布会上布置了什么——我不知道。`},{text:`我拿起手机。三条新的消息。`},{text:`第一条：物业短信——"尊敬的林萧业主，您的门禁卡于今日15:42在物业服务中心办理了挂失和补办。新卡已激活。"我没有去过物业。`},{text:`第二条：楼下沈姐发来的——"小林你今天是不是换了个快递地址？刚有个快递小哥拿着你名字的包裹来店里问路。"`},{text:`第三条：苏鹤。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`还剩48小时。你想好了吗？`,time:`18:01`}},{text:`我想好了。`},{text:`第三章 · 替换 · 完`,effect:{type:`delay`,ms:2500}}],choices:[{text:`"我们去发布会。我要在所有人面前证明我还存在。"`,nextScene:`ch4_start`,setFlag:{plan_public_final:!0}},{text:`"带我去找邱成。在发布会之前。"`,nextScene:`ch4_start`,setFlag:{find_qiucheng:!0}}]},{id:`ch4_start`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`第三天。也就是发布会前一天。`},{text:`我醒来的时候发现手机面容解锁失效了。iPhone 的 Face ID 提示："无法识别面孔——请使用密码。"我输入密码。密码是正确的。手机打开了。`},{text:`但面容 ID 不认识我了。`},{text:`我把手机举到面前。前置摄像头里是一张介于林萧和邱成之间的脸。我不确定这个说法是不是准确——但就像系统也在犹豫。一部分像素属于我，另一部分属于三周前从精神病院消失的那个人。`},{text:`上午九点。我回到自己的公寓楼下。`},{text:`门禁系统不认我的卡。昨天下午三点四十二分，有人以"林萧"的名义在物业服务中心挂失了旧卡，补办了新卡。新卡在另一个人手里。`},{text:`我按了对讲。没有人接。我的房间在三楼。窗帘拉得紧紧的——我出门从来不拉窗帘。`},{text:`有个人坐在我的房间里。穿着我的拖鞋。用我的茶杯。窗帘后面那个剪影的肩膀宽度——比我宽一点。灰色卫衣。`},{text:`买家已经到了。`},{text:`我站在楼下。没有上去。因为如果我上去，我和那个人之间的"谁是真正的林萧"就会从理论问题变成物理冲突。而在物理世界里，白窗的赢面比我大。`},{text:`我转身走了。`},{text:`路过沈姐的早餐铺。她正在收摊。看到我，手里的抹布停了。`},{character:`沈姐`,text:`……小林？`},{text:`她的语气不是"你好"。是"你是哪一个"。`},{character:`林萧`,text:`沈姐。是我。`},{character:`沈姐`,text:`刚才……`},{text:`她回头看了一眼身后的方向。那个方向通往我的公寓。`},{character:`沈姐`,text:`刚才不是你来买了豆浆吗。还说今天比平时早。`},{text:`我们对着彼此站了几秒。她看我的眼神和第一天早上一样——在辨认。在比对。在两个版本之间犹豫。`},{character:`沈姐`,text:`算了。大概是我记混了。`},{text:`她不是记混了。她是放弃了判断。因为在她眼里，两个林萧都可能是真的，也都可能是假的。而她没有时间去查证。`},{text:`这正是白窗的逻辑。`},{text:`不是让所有人相信假的那个。是让所有人不再确定真的那个。不确定就够了。不确定就会观望。观望就不会帮你。`},{text:`我离开的时候，沈姐的抹布还在手里攥着。没有对我说再见。`}],nextScene:`ch4_fallout`},{id:`ch4_fallout`,background:`gradient:linear-gradient(180deg, #2c3040 0%, #1a1d28 100%)`,dialogues:[{text:`我试着联系最后几个能联系的人。`},{text:`前同事。前前同事。大学时一起做毕设的搭档。一个很久没联系但我记得他欠我一顿饭的朋友。`},{text:`第一个电话没有接。第二个电话接了——但对方说"你不是林萧吧，他昨天给我打过电话了，说换号了。你这个号是旧的，你是不是骗子？"。`},{text:`第三个电话接了，沉默了很久，说：'我不知道你们谁是真的。但是昨天打来那个'林萧'，说了很多只有咱俩知道的事。所以——对不起。'`},{text:`白窗不只是在数字层面覆盖我。他们在物理世界里，用那个拥有邱成脸的人，一个一个地接触我的社交网络。那个人不需要演得很像——他只需要说得出几件"只有林萧才知道的事"就足够。`},{text:`那些事是谁告诉他的。`},{text:`我的社交媒体。我的聊天记录。我的云盘备份。所有属于"林萧"的数字记忆——现在都在白窗手里。他们不是偷走我的脸。他们偷走了我的整个过去。然后把它交给了一个坚信自己就是林萧的病人。`},{text:`我挂了电话。在通讯录里翻了很久。翻到了周其深的名字。`},{text:`我盯着那个名字看了十秒。然后继续往下翻。已经没有必要了。`},{text:`我打开物业APP。想查看一下房屋租赁信息。我的名字已经从租户信息里消失了。更换成了——空白。空白的姓名栏。空白的手机号。空白意味着"待填写"。空白意味着"这个房间很快就会属于别人"。`}],nextScene:`ch4_margins`},{id:`ch4_margins`,background:`gradient:linear-gradient(180deg, #1a1a24 0%, #0f0f18 100%)`,dialogues:[{text:`傍晚。我坐在一家网咖的角落里。开了三个小时的临时卡——不需要身份证的那种。网管看了我一眼，没有多问。`},{text:`我的全部行李是一个背包。里面装着一台笔记本电脑、一个充电宝、一把牙刷、一份派出所的备案记录、一份银行的挂失回执。这些加起来，就是"林萧"这个身份剩下的全部物理证据。`},{text:`网咖里弥漫着烟味和空调压缩机的嗡鸣。旁边座位的年轻人在打LOL，键盘声很响。没人看我。没人在意。在这里，匿名的权利是免费的。`},{text:`我打开加密聊天室。苏鹤在线。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`你现在在哪。`,time:`19:44`}},{character:`林萧`,text:`网吧。公寓已经不能回去了。房子里有人——买家的物理替身。门禁卡、银行卡、社交账号全被切了。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`比我预想的快。通常第四阶段——物理替换——是在最后72小时加速的。他们知道你明天有发布会。他们在抢时间。`,time:`19:45`}},{character:`林萧`,text:`我明天怎么去发布会？我不能一个人去——我连门都进不去了。出版社的合同上那个邮箱是镜像组的。周其深是他们的人。保安已经不认得我了。`},{text:`苏鹤停了片刻。然后发来了一段让我手开始发抖的文字。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我们见面吧。`,time:`19:47`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`线下。明天发布会之前。今晚或者明早。有一个地方——城东废弃的富华商场，四楼。那里没有监控。我来找你。`,time:`19:48`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`有些东西我必须当面告诉你——也当面给你。`,time:`19:48`}},{text:`苏鹤要见我。`},{text:`这个从第一章第一页开始通过手机和我对话的人——这个曾经的"白窗内部人士"——要和我面对面。`},{text:`我不知道TA长什么样。不知道TA是男是女。不知道TA说的一切是不是另一层陷阱。`},{text:`但我知道一件事：苏鹤说的每一个事实，目前为止，全都是真的。`}],choices:[{text:`同意——今晚去废弃商场见苏鹤`,nextScene:`ch4_meet_suhe`,setFlag:{meet_suhe_offline:!0,trust_suhe:!0}},{text:`先不去——用最后一点时间联系出版社，试着确认发布会还在不在`,nextScene:`ch4_contact_publisher`,setFlag:{contact_publisher:!0}}]},{id:`ch4_meet_suhe`,background:`gradient:linear-gradient(180deg, #0f0f18 0%, #1a1a24 30%, #0f0f18 100%)`,dialogues:[{text:`晚上九点。城东的废弃商场矗立在一片拆迁废墟中间，像一艘搁浅的巨轮。`},{text:`我穿过被撬开的铁栅栏门，手电筒的光柱在空荡荡的中庭里扫过。地面是碎裂的瓷砖。天花板的吊顶塌了一半，露出黑色的钢结构。没有灯。没有人。`},{text:`四楼。自动扶梯已经不转了，钢制踏板生着锈。我一步一步往上走。脚步声在空旷的大厅里回荡，像有人在另一个方向跟着我。`},{text:`四楼是原来的餐饮区。快餐店的招牌还挂着，上面的字已经褪成了灰白色。我找了一个靠窗的位置，坐在地上的一堆废弃坐垫上，背靠着墙，看着楼梯口。`},{text:`等了大概十五分钟。然后楼梯口的光线变了一下。一个人在暗处站了很久，才慢慢走近。`},{text:`手电筒照到TA的时候，我看到了一张比我预想中年轻的脸。三十岁左右。很瘦。戴着一副金属细框眼镜。背着双肩包。看起来像一个大学图书馆里会坐在角落查论文的人。`},{character:`苏鹤`,text:`林萧。`},{text:`TA的声音和加密聊天室里的文字对不上——因为文字没有声音。现在有了。轻的。有点沙哑。`},{character:`林萧`,text:`苏鹤。`},{text:`TA在我对面坐下来。把双肩包放在地上，拉开拉链。里面不是武器。是文件。打印出来的邮件、截图、身份数据比对表。TA准备得像一场学术答辩。`},{character:`苏鹤`,text:`我在白窗待了两年。这期间我看到了十一个案例。十个成功。一个失败——邱成，某种意义上也算成功了，因为他的身份确实消失了。但他的人是活着的。这给了他们一个新思路：活着的人可以被复用。`},{character:`苏鹤`,text:`你的买家叫郑维——前地产公司资金部总监。他的公司在去年暴雷，欠了四个亿的信托资金。根据刑法，他面临的是非吸和诈骗两个罪名，刑期十二年起步。`},{character:`苏鹤`,text:`郑维需要一个清白的人生。林萧——自由插画师，无贷款，无案底，社交圈简单——是完美的外壳。`},{text:`TA从文件堆里抽出一张打印的护照照片。上面的男人四十多岁，梳着很整齐的头发，嘴角上扬的角度让人觉得他习惯了赢。`},{character:`苏鹤`,text:`这个人明天会出现在你的发布会上。不是作为观众——作为"林萧"。他会感谢出版社，感谢编辑周其深。他会宣布接下来的一本新书计划。他会拍很多照片。然后他会拿着林萧的身份，上个月已经办好的护照，下周一飞新加坡。`},{text:`我盯着那张照片。那个叫郑维的男人。那个已经住进我公寓的男人。那个明天将在我所有朋友和媒体面前变成"林萧"的男人。`},{text:`然后苏鹤从背包最底层拿出了一个东西。`},{text:`一个小型硬盘。黑色。上面贴着一张白色标签：LX-2040-FULL。`},{character:`苏鹤`,text:`这是能帮你的东西。里面是我从白窗服务器上导出的你的完整档案——侦察组四个月的观察记录、镜像组三周的操作日志、替换组的通讯记录。还有邱成的病历原件。以及郑维的身份比对。`},{character:`苏鹤`,text:`你明天拿着这个去发布会。如果媒体在场——如果你能在麦克风前面待够五分钟——你就能制造出足够多的社会证据，让白窗的"身份交易"至少在你这单上破产。他们最怕的不是警察——是曝光的媒体。一旦有记者开始查，买家的兴趣就会归零。`},{text:`TA把硬盘放在我手上。金属的手感很冷。`},{character:`苏鹤`,text:`我欠邱成的。也欠你的。`},{text:`第四章 · 空白 · 完`,effect:{type:`delay`,ms:3e3}}],nextScene:`ch5_start`},{id:`ch4_contact_publisher`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`我没有立刻答应苏鹤。`},{text:`因为如果苏鹤说的都是真的——如果明天发布会就是白窗完成交易的舞台——那么光靠我一个人冲进去是不够的。我需要知道发布会的场地还在不在。媒体还在不在。周其深还在不在。`},{text:`我拨了出版社总编的电话——不是周其深，是他的直属上司，一个叫陈社长的中年男人。我以前只跟他开过三次会，说过的话加起来不超过二十句。`},{text:`电话响了很久。久到我以为不会接了。然后——通了。`},{character:`陈社长`,text:`喂？哪位？`},{text:`他不认识我的号码。或者说，他不认识"旧林萧"的号码。`},{character:`林萧`,text:`陈社长您好，我是林萧。明天发布会的作者。`},{text:`一个短暂的停顿。然后——`},{character:`陈社长`,text:`林萧？我们下午不是刚通过电话吗——不对，今天下午打过来的是个杭州的号码，说确认发布会流程。你是——`},{text:`他的声音里出现了那种和沈姐一模一样的困惑。他在两个林萧之间左右摇摆，不知道该相信哪一个。`},{character:`林萧`,text:`陈社长，今天下午打电话的那个人不是我。如果明天来发布会的那个人——长得和我很像，但不是完全一样。如果他穿了灰色卫衣。如果他的肩膀比我宽。如果他右手腕上戴着我从来不戴的银色链子——那个人不是我。`},{text:`更长的停顿。我听到了陈社长在桌面上翻纸的声音。`},{character:`陈社长`,text:`我不清楚你在说什么。林萧跟我们出版社合作了六年——你觉得我能认不出他？`},{character:`林萧`,text:`您当然能认出他。您认识了他六年。但您从来没跟他说过超过二十句话。您认识的是他的画稿、他的合同、他每次交稿的邮件落款。而这些东西——从三周前开始——已经全部属于另一个人了。`},{text:`沉默。`},{character:`陈社长`,text:`我不确定你打的这通电话是怎么回事。明天的发布会在下午两点，市图书馆多功能厅。如果你真是林萧——你就来。如果你不是——来了自然会被认出来。`},{text:`他挂了。没有说再见。没有说"抱歉"。但他也没有完全关上这道门。`},{text:`他给了我最需要的东西：地点、时间、和一个开放的质疑。`},{text:`现在只剩一个问题：到了明天下午两点，站在市图书馆多功能厅台上的人，会是谁。`},{text:`第四章 · 空白 · 完`,effect:{type:`delay`,ms:3e3}}],nextScene:`ch5_start`},{id:`ch5_start`,background:`gradient:linear-gradient(180deg, #0a0a14 0%, #1a1a2e 50%, #0a0a14 100%)`,onEnter:{setFlags:{ch5_started:!0}},dialogues:[{text:`上午十一点。距离发布会还有三个小时。`},{text:`我在一家二十四小时便利店的洗手间里换了一件干净的衬衫。最便宜的白色，透明塑料袋包装，标签还贴在领口后面。对着卫生间里那面模糊的镜子，我看了看自己。`},{text:`我已经不确定镜子里的脸是谁的了。只觉得眼眶更深了。可能是熬夜。也可能是因为那个正在覆盖我面孔的人——邱成——他的眼眶本来就比我的深。`},{text:`苏鹤给我的硬盘在我背包里。重得像一块砖。里面是白窗的罪证、邱成的病历、郑维的身份比对。这些数据如果公开——哪怕只有十分之一——就足够让至少一个记者产生兴趣。`},{text:`我从便利店出来。外面阳光很亮，是那种让人无处可躲的冬日晴天。市图书馆在城中心，地铁三站路。`},{text:`地铁上人不多。我坐在靠门的位置，对面的玻璃上映出我的影子。我盯着那道影子，影子也盯着我。至少现在，我还是我。`},{text:`手机上跳出一条消息。苏鹤。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`我到了。在图书馆对面的咖啡馆。他也到了。`,time:`11:23`}},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`穿灰色卫衣。右手腕银色链子。和你说的一模一样。他跟周其深一起进的多功能厅。门口已经有媒体在签到了。`,time:`11:24`}},{text:`他也到了。`},{text:`那个穿灰色卫衣的人。那个用邱成的脸覆盖我的人。那个被白窗从精神病院弄出来以后每天告诉自己"我是林萧"的人。他已经进去了。和周其深一起。`},{text:`周其深。六年的编辑。此刻正和一个陌生人一起走进我的新书发布会。`},{text:`我在地铁座位上闭上眼。深呼吸。`},{text:`然后苏鹤又发来一条。`},{text:``,effect:{type:`chat_message`,sender:`苏鹤`,message:`还有一件事。停车场里有一辆黑色奔驰，浙A牌照。我问了之前在镜像组的同事……那是郑维的车。他亲自来了。`,time:`11:25`}},{text:`郑维。买家。前地产公司资金部总监，欠了四个亿，面临十二年刑期。`},{text:`他亲自来了。因为他要亲眼看着交易完成——看着"林萧"这个身份在媒体镜头前被正式移交到他手里。`},{text:`然后他会穿着林萧的名字，下周一飞新加坡。留下一堆烂摊子、四个亿的债务——和一个已经不存在的林萧。`}],nextScene:`ch5_arrival`},{id:`ch5_arrival`,background:`gradient:linear-gradient(180deg, #d5dce0 0%, #c0c8cc 100%)`,onEnter:{setFlags:{arrived_venue:!0}},dialogues:[{text:`市图书馆是一座灰色花岗岩建筑，正门前面是一排旗杆和很宽的台阶。今天多功能厅外面立了一块牌子——"《漫长的画框》新书发布会——作者：林萧"。`},{text:`我的书名。我的名字。`},{text:`我站在街对面的公交站台后面。从这个角度可以看到签到台。一个穿出版社工作服的年轻女孩在给来宾发胸牌。周其深站在她旁边，表情平静，像一个称职的编辑在等待他最重要的作者。`},{text:`然后「他」出来了。`},{text:`灰色卫衣。右手腕银色链子。比我稍宽的肩。比我短一点的头发。`},{text:`他走到签到台前，拿起一本样书——我的书——翻开，对着封面微笑。那个微笑的角度，和上周六赵禹朋友圈合照里的一模一样。和我在镜子里看到的那个"差一点就对"的笑容一模一样。`},{text:`他是邱成。他坚信自己是林萧。他正在和我的编辑聊天，翻着我的书，准备去我的发布会上做我的自我介绍。`},{text:`而我。站在街对面的公交站台后面。穿着便利店买的白衬衫。背包里装着一个硬盘和一份派出所备案记录。`},{text:`我是在此刻意识到一个问题——白窗不需要证明他是假的。白窗只需要让这个世界同时存在两个林萧，然后让更符合系统记录的那一个获胜。`},{text:`他有银行卡。他有门禁卡。他有合同上的邮箱。他有周其深的背书。他有发布会。`},{text:`我有一件白衬衫。一个硬盘。和一个叛逃了两年的前白窗成员。`}],choices:[{text:`直接走进去。在签到台前面，当着所有人的面，质问周其深`,nextScene:`ch5_confront`,setFlag:{direct_confront:!0}},{text:`先找到苏鹤。拿到TA手里的更多证据，商量好再一起进去`,nextScene:`ch5_rendezvous`,setFlag:{rendezvous_suhe:!0}}]},{id:`ch5_confront`,background:`gradient:linear-gradient(180deg, #e8e0d8 0%, #d5ccc0 100%)`,sprites:[{character:`周其深`,position:`left`,expression:`default`}],dialogues:[{text:`我走过马路。穿过那排旗杆。走上台阶。每一步都踩得很重，像在往地里钉桩。`},{text:`签到台的那个女孩抬头看我。她的视线在我的脸上停了一下。然后看了看我身后——在看有没有另一个「我」正走过来。`},{text:`周其深转过头。看到我的瞬间，他的表情出现了一丝裂痕——非常短，半秒，然后被职业性的微笑覆盖了。`},{character:`周其深`,text:`你——`},{character:`林萧`,text:`我来了。六年的作品。不该缺席。`},{text:`那个穿灰色卫衣的人——邱成——听到我的声音。转过来。我们面对面。`},{text:`我看到了自己的脸。不是镜子里的。不是照片里的。是活的。是站在我两步之外的一个有呼吸的人——他的眼眶比我的深，他的肩膀比我宽，他右手腕上有一条银色链子。但他的脸——从某个角度，在某种光线下——就是我的脸。`,effect:{type:`shake`}},{text:`他也看到了我。他的瞳孔微微放大。他后退了半步。`},{character:`邱成`,text:`你是谁？`},{text:`他说这三个字的时候，声音里没有恶意。有恐惧——真实的、纯粹的恐惧。像一个人在被别人从一场很深的梦里摇醒。`},{character:`林萧`,text:`我叫林萧。是这本书的作者。你是邱成。`},{text:`说出他的名字的时候，我看到他的嘴唇开始发抖。`},{character:`邱成`,text:`我——我是林萧。我一直都是林萧。我哥说的——我哥说——`},{text:`那个"哥哥"。送他去精神病院的人。把他弄出来的人。告诉他"你是林萧"的人。`},{text:`周其深往前迈了一步，想说话。我看了他一眼。他闭上了嘴。`},{text:`签到台的小姑娘已经完全不知道该看谁了。手里的胸牌悬在半空。`},{text:`然后多功能厅的门开了。里面传出麦克风调试的声音。发布会要开始了。`}],nextScene:`ch5_climax`},{id:`ch5_rendezvous`,background:`gradient:linear-gradient(180deg, #c8c0b8 0%, #b0a89e 100%)`,sprites:[{character:`苏鹤`,position:`right`,expression:`default`}],dialogues:[{text:`我绕过正门，从侧面的消防楼梯下到图书馆背后的一条小巷。对面是一家叫"旧时光"的咖啡馆。`},{text:`苏鹤坐在角落靠窗的位子。面前摆着一杯已经不冒热气的咖啡。TA看到我进来，微微点了点头。`},{character:`苏鹤`,text:`我搞到了更多东西。`},{text:`TA把笔记本电脑的屏幕转过来。上面是一封邮件的截图——周其深和郑维之间的通讯记录。日期是三周前。`},{character:`苏鹤`,text:`这封邮件确认了两件事。第一：周其深从一开始就知道。他不是被迫配合的——他是白窗的正式成员。他介绍给你的出版合约是交易的一部分。那个合约存在的唯一目的，就是给你一个"即将成功"的幻象。`},{character:`苏鹤`,text:`第二：发布会不是白窗的"终点"。它是公共仪式。白窗需要影像记录——一个被媒体见证的"林萧作者发布会"——来锁定身份归属。一旦这段影像出现在新闻里，那个影像里的人就成了法律上的"林萧"。法院、银行、出入境——全看这个。`},{text:`TA点开另一个文件。一个音频文件。时长三分钟。`},{character:`苏鹤`,text:`这是周其深和郑维昨天的通话录音。我通过白窗内部的中继服务器截到的。郑维很紧张。周其深在安抚他——说"那个人已经不在公寓了，银行卡全锁了，不会出现在现场"。`},{text:`他说的"那个人"是我。`},{character:`苏鹤`,text:`他们不认为你能来。也不认为你敢来。你的出现——本身——就是他们的计划里没有的变量。`},{character:`林萧`,text:`那我们就让他们意外。`},{text:`苏鹤从背包里拿出一个访客胸牌——和签到台发的那个一模一样。TA在上面印好了我的名字。`},{character:`苏鹤`,text:`准备好进去了吗？`}],nextScene:`ch5_climax`},{id:`ch5_climax`,background:`gradient:linear-gradient(180deg, #d5d0c8 0%, #c0b8a8 100%)`,dialogues:[{text:`下午一点五十分。多功能厅里的座位已经快坐满了。`},{text:`我在后排靠门的位置站着——一个不起眼的角落。从这里可以看到整个厅：前三排是媒体和嘉宾，后面是读者和出版社的合作方。舞台上摆了一张桌子和一把椅子。桌子上放着我的书。旁边是一块投影屏幕，正在循环播放我的手稿插图。`},{text:`那些画是我画的。每一笔每一线。没有谁能偷走这个。不管他们用了谁的脸，那双画出这些线条的手是我的。`},{text:`邱成——那个被白窗安排成「林萧」的病人——坐在第一排最边上的位子。他的手放在膝盖上，攥得很紧。肩膀上微微发抖。他大概很紧张——他的妄想告诉他他是林萧，但他的身体知道他不应该是这场发布会的主角。`},{text:`周其深站在舞台侧面，手里拿着流程单。他看了手机。又看了门口。他看门口的时候，看到了我。`},{text:`我们对视了大概三秒。他的表情变了——不是愤怒，不是恐惧。是一种很安静的、几乎像是解脱的东西。`},{text:`他给我发了一条短信。`},{text:``,effect:{type:`chat_message`,sender:`周其深`,message:`你还是要来。我想过你会来。也想过你不会来。我不知道哪一个结果我更希望。`,time:`13:52`}},{text:``,effect:{type:`chat_message`,sender:`周其深`,message:`六年前我第一次看你的画稿，我跟陈社长说——这个人的画会出版。我说的是真的。我帮你做的所有事，出版的事，合同的事——我是真心想帮你。`,time:`13:52`}},{text:``,effect:{type:`chat_message`,sender:`周其深`,message:`但我也是白窗的人。这两个身份在我身上共存了六年。我没有办法跟你解释这个。`,time:`13:53`}},{text:`我看着手机屏幕。`},{text:`六年。他一直在两个身份之间活着。一个真心想帮林萧出版的编辑。一个奉命监视林萧的白窗成员。到底哪一个才是他真的自己——可能连他自己都不知道。`},{text:`两点整。陈社长走上舞台。敲了敲麦克风。所有人的注意力转向了讲台。`}],choices:[{text:`在周其深介绍「作者」之前，走上舞台，代表自己`,nextScene:`ch6_ending_b`,setFlag:{route_public_fight:!0}},{text:`等邱成上台后，在媒体面前揭穿一切——让所有人都看到两个「林萧」`,nextScene:`ch6_ending_a`,setFlag:{route_dual_reveal:!0}},{text:`转身离开。不去发布会了。去找郑维——买家本人。`,nextScene:`ch6_ending_c`,setFlag:{route_confront_buyer:!0}},{text:`什么都不做。坐在角落。让他们完成他们的交易。然后消失。`,nextScene:`ch6_ending_d`,setFlag:{route_disappear:!0},condition:{flag:`doubt_start`,value:!0}}]},{id:`ch6_ending_a`,background:`gradient:linear-gradient(180deg, #d5d0c8 0%, #c0b8a8 100%)`,sprites:[{character:`周其深`,position:`left`,expression:`default`}],dialogues:[{text:`陈社长说完开场白，做了一个手势。周其深走到麦克风前。`},{character:`周其深`,text:`各位来宾，各位媒体朋友——我非常荣幸地介绍今天的作者。这是我和他合作的第六年。他是一个非常有才华的——`},{text:`我没有等他说完。`},{text:`我在所有人的目光中站起来。从后排走到前排。每一步都清晰可闻——多功能厅的木地板在我脚下嘎吱作响。`},{text:`周其深停下了。邱成转过头——他的脸在投影仪的光线下显得苍白。`},{character:`林萧`,text:`在他介绍之前，我想请各位看两张脸。`},{text:`我把硬盘接到投影仪上。苏鹤给我的文件在大屏幕上展开——左侧是林萧三年前的证件照。右侧是邱成在杭州市第七人民医院的病历照片。`},{text:`两张脸。不同的名字。但在骨骼结构上，在颧骨弧度上，在下颚线角度上——有着诡异的相似。不是因为他们是同一个人。是因为白窗花了三个月，用邱成的脸一层一层地覆盖掉了林萧的脸。`},{text:`厅里一阵骚动。媒体的快门声响了起来。`},{character:`林萧`,text:`左边这张照片上的脸——是我的。右边这张——是这个男人三周前从精神病院失踪时的病历照。他叫邱成。他不是林萧。`},{text:`我转向邱成。他的嘴唇在发抖，眼眶里有什么东西快要碎了。`,effect:{type:`shake`}},{character:`林萧`,text:`邱成。你哥哥——那个人不是你的哥哥。他是白窗的成员。他从精神病院把你弄出来，告诉你你是林萧。他给你看了照片，给你讲了故事，让你相信自己一直就是这个人。因为你的妄想症让你特别容易相信别人告诉你的"你是谁"。`},{text:`邱成站起来。他的手在发抖。`},{character:`邱成`,text:`我——我哥不会骗我。我哥说——我哥说我是林萧。我有——我有合同，我有卡，我有——`},{text:`他掏出口袋里的门禁卡。银行卡。发布会上签了名的书。这些"证据"散落在地上。`},{character:`林萧`,text:`这些不是你的。它们是我的。白窗把它们从我这偷走了，交给了你。你也是受害者。`},{text:`然后门开了。`},{text:`两个穿深色西装的男人走进来。不是警察。是郑维的人。他们走到邱成身边——不是来保护他，是来确定这笔交易还能不能按计划完成。`},{text:`媒体的镜头转向了他们。有人开始打电话。有人在喊陈社长的名字。多功能厅里一片混乱。`},{text:`十五分钟后警察真的来了。有人报了警。但警察到场后核实的是——身份证。银行卡。系统的记录。门禁的补办记录。合同。所有这些都指向同一个人：邱成手上那一套。`},{text:`而我手里的硬盘——不管里面的内容有多真实——不能当场取代一套完整的、经过验证的身份系统。`},{text:`警察问我：你能提供目前有效的身份证件吗？`},{text:`我的身份证在公寓里。在郑维手里。`},{text:`警察问：你有银行卡吗？`},{text:`我的银行卡被挂失了。补办的那张在邱成手里。`},{text:`警察问：有人能证明你是林萧吗？`},{text:`我看向周其深。他没有看我。`},{text:`沈姐不在。同事不接电话。所有"能证明我是我"的人，要么已经接受了另一个版本，要么不够确定。`},{text:`那天傍晚。我在派出所的留置室里待了六个小时。不是因为被指控了什么罪——是因为他们不知道该用哪个身份处理我。`},{text:`第二天上午。郑维的人来了一趟。不是来找我的——是来提交"林萧"的护照申请的补充材料的。包括昨天发布会上"作者林萧"的媒体照片。那些照片上的人——是邱成。但在法律意义上、媒体记录上、社会共识上——那就是林萧。`},{text:`一周后。我坐在杭州市第七人民医院的诊室里。这间诊室和邱成待过的那间是同一间。窗户外面是同一棵树。`},{text:`医生翻了翻我的病历。上面写着：林萧。偏执妄想症。坚信自己的身份被一个叫"白窗"的组织替换。自称是插画师，但无法提供有效的作品著作权证明。曾多次骚扰出版社工作人员和社会友人。`},{text:`这份病历不是白窗写的。是郑维在接管身份之后——以"林萧"的医保账户——为"一个和自己长得很像的妄想症患者"预约的医疗救助。`},{text:`我的身份证上现在写着林萧。我的病历上写着偏执妄想症。我的医保由另一个林萧支付。`},{text:`没有人能分辨。没有人需要分辨。`},{text:`《换锁》`,effect:{type:`delay`,ms:3e3}},{text:`身份的锁换了。你仍然是林萧。但你被关在了属于你的名字里面。`},{text:`— 全故事完 —`,effect:{type:`delay`,ms:4e3}}]},{id:`ch6_ending_b`,background:`gradient:linear-gradient(180deg, #d5d0c8 0%, #c0b8a8 100%)`,sprites:[{character:`周其深`,position:`left`,expression:`default`}],dialogues:[{text:`陈社长敲完麦克风，正要说"下面有请编辑周其深介绍今天的作者"。`},{text:`我从后排站起来。没有跑。没有喊。只是一步一步地往前走。`},{text:`所有人的目光转过来。包括周其深。包括邱成。包括坐在最后一排角落里的苏鹤。`},{text:`我走上舞台。站在了麦克风前面。`},{character:`林萧`,text:`各位好。我是林萧。《漫长的画框》的作者。`},{text:`台下安静了大概两秒。然后几个认识我的记者开始交头接耳。他们看看台上的我——又看看第一排的邱成。相同又不同的两张脸。`},{character:`林萧`,text:`你们现在看到的是两个人。一个人叫林萧。另一个人叫邱成——他三周前从杭州市第七人民医院失踪。坐在第一排的这位编辑周其深——他和另一个组织一起，策划了这三个星期里你们看到的每一个"林萧"的异常。`},{text:`陈社长站起来了。他想说什么。然后苏鹤从后排举起手，把一个小音箱放在了座位扶手上。`},{text:`音箱里传出了周其深和郑维昨天的通话录音。整个多功能厅都听到了。`},{character:`周其深`,text:`……那个人已经不在公寓了。银行卡全锁了。不会出现在现场。`},{text:`然后是郑维的声音——带着一种很平静的不耐烦。`},{character:`郑维`,text:`最好别出问题。我这边的机票已经出了。`},{text:`录音播放的时候，媒体的快门声连成了一片。周其深站在原地——没有跑。没有辩解。`},{text:`他转过身，看了我一眼。那个眼神里有恐惧，有歉意，还有一种我没想到的东西：释然。`},{text:`警察到场以后，苏鹤把硬盘里的全部数据交给了警方。白窗的侦察档案。镜像组的操作日志。替换组的通讯记录。邱成的病历原件。郑维的身份比对。周其深和郑维的邮件往来。`},{text:`调查持续了四个月。`},{text:`白窗没有全部落网——他们的架构太分散，法律管辖权太模糊——但郑维的交易被冻结。周其深因协助身份伪造被起诉。邱成被送回了杭州七院——这一次，用了他自己的名字。`},{text:`至于我。`},{text:`银行卡解冻了。护照上还是我的脸。物业系统里的租户名字恢复了。我搬回了自己的公寓。沈姐的豆浆油条还在每天早上等着我。她没有说"对不起"——她从来不是那种会说对不起的人。但她在我的豆浆杯下面多压了一根油条。免费的。`},{text:`苏鹤去了另一个城市。TA给了我一个私人的加密邮箱，说"如果有白窗的案子需要证人的时候"。我说好。`},{text:`六年后。我在同一家出版社——新的编辑，新的合同，新的书——签下了第二本书的合约。这次合同上的每一个邮箱、每一个电话、每一个名字，都是我自己核对的。`},{text:`《裂缝》`,effect:{type:`delay`,ms:3e3}},{text:`裂缝不是失败。裂缝是光照进来的地方。你的身份是你的，因为你自己抢了回来。`},{text:`— 全故事完 —`,effect:{type:`delay`,ms:4e3}}]},{id:`ch6_ending_c`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #0d1117 100%)`,dialogues:[{text:`我没有进多功能厅。我从图书馆侧门出去，穿过停车场。`},{text:`黑色奔驰。浙A牌照。后座的车窗只摇下来一半。`},{text:`郑维坐在车里。四十多岁。梳着很整齐的头发。手机夹在耳朵和肩膀之间。他看到我的瞬间——电话那头的声音还在响——他不动了。`},{text:`我拉开车门。坐进后座。我们之间隔着一瓶没开过的矿泉水。和一个LV公文包。`},{character:`郑维`,text:`你比照片上瘦。`},{character:`林萧`,text:`你也比我想象中安静。我以为欠了四个亿的人会更慌一点。`},{text:`他笑了。那是一种在谈判桌上练了很多年的笑——不真诚，但很舒服。`},{character:`郑维`,text:`说吧。你想要什么。钱？你的身份？还是让我消失？`},{character:`林萧`,text:`我要一份工作。`},{text:`他挑了挑眉毛。`},{character:`林萧`,text:`白窗需要新目标。你们需要有人帮你们找到合适的人选。独居。自由职业。不引人注意。没有人比我更懂你们的猎物长什么样——因为我就是。`},{text:`郑维看了我几秒。然后拿起手机，拨了一个号码。对那头只说了一句话：`},{character:`郑维`,text:`把"林萧"那单的成交窗口延长。有一个新情况需要讨论。`},{text:`然后他把手机放下。把公文包里的矿泉水拿出来，递给我。`},{character:`郑维`,text:`欢迎入局。`},{text:`那天晚上。我住回了自己的公寓。门禁卡是郑维的人送来的。银行卡的补办通知发到了我可以收到的邮箱。物业系统里的租户信息恢复了——一字不差。`},{text:`苏鹤不知道这次交易。TA后来给我发了十几条消息。我没有回。`},{text:`一个月后。我坐在电脑前面。屏幕上是一个人的社交媒体主页——女性，二十五岁，独居杭州，自由插画师，在微博上刚发了第一张原创作品。评论区里全是"小姐姐好有才华""期待更多"。`},{text:`就是那种最容易被覆盖的人。`},{text:`我的任务很简单：发私信。以"同行编辑"的身份建立联系。开始收集她的个人信息。三个月后，她的名字会出现在白窗的拍卖页面上。`},{text:`我在输入框里打出了第一行字。`},{text:`我的手指停在键盘上方。我想起了沈姐。想起了苏鹤。想起了邱成发抖的嘴唇。想起了那个在便利店洗手间里对着镜子不认得自己的人。`},{text:`然后我按下了发送键。`},{text:`《魔瓶》`,effect:{type:`delay`,ms:3e3}},{text:`你从瓶子里出来了。现在你成为了瓶子。瓶子里不是魔鬼——瓶子里是一个循环。每一个受害者都可以变成捕食者。门只能从里面打开。而你选择了从里面锁上它。`},{text:`— 全故事完 —`,effect:{type:`delay`,ms:4e3}}]},{id:`ch6_ending_d`,background:`gradient:linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)`,dialogues:[{text:`我没有站起来。没有去舞台。没有去找郑维。`},{text:`我只是从座位上起身，推开了多功能厅后侧的安全门——那道门通向消防通道，没有锁——然后走进了外面冬日下午的冷空气里。`},{text:`陈社长的声音从门缝里漏出来：「下面有请编辑周其深介绍今天的作者——」然后是掌声。掌声不是给我的。`},{text:`我站在图书馆后门外面的小巷里。阳光被两栋楼切成很窄的一条线。地上有一根排水管在滴水。空气很冷。但呼吸很顺畅。`},{text:`我忽然意识到，这是三周以来我第一次没有被"必须证明我是谁"这个念头压着。`},{text:`我回到公寓楼下。这一次，我没有试着开门。我在楼下便利店买了一个纸箱。跟沈姐说我要搬家。沈姐问搬去哪。我说还不知道。`},{text:`她从柜台后面拿了一卷胶带，放在我的纸箱上。`},{character:`沈姐`,text:`不管去哪——油条冷了就不脆了。趁热吃。`},{text:`我在公寓里收拾了所有东西——但最后只装了一个背包。笔记本电脑。充电宝。一支外婆留给我的钢笔。一件换洗的衬衫。还有我六年前画的第一本手稿——不是出版的版本，是更早的，画在速写本上的，只有我一个人见过的那一本。`},{text:`硬盘我没有带。编号LX-2040-FULL。我把它留在了空荡荡的房间里。让下一个人发现它。或者不发现。`},{text:`傍晚。我坐在火车站的候车大厅里。大屏幕上滚动着发车时刻表——杭州、郑州、西安、兰州、乌鲁木齐。`},{text:`我买了一张去最远的票。不是因为想去那里。是因为路程够长。长到我可以在火车上什么都不想。`},{text:`火车开动的时候，窗外的城市慢慢往后退。一个越来越小的形状——那个关了我六年的城市，那个擦掉我脸的城市，那个让我不确定自己是不是真的活过的城市。`},{text:`我打开速写本。翻到空白的一页。握起外婆的钢笔。`},{text:`画了一个人。不是林萧。不是邱成。不是我在镜子里看到的那张脸。是一个新的、刚刚开始成形的人。`},{text:`我不知道她叫什么。但我觉得她比我有勇气。`},{text:`《空画框》`,effect:{type:`delay`,ms:3e3}},{text:`消失不是放弃。有些活着的方式不需要名字。空白的画框不是空的——它在等第一笔。`},{text:`— 全故事完 —`,effect:{type:`delay`,ms:4e3}}]}],b=new class{ctx=null;masterGain=null;currentMood=`silent`;currentLa
